<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raksha Elite - Hardcore Master</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00d2ff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: #fff; margin: 0; padding: 0;
            min-height: 100vh; user-select: none;
            text-align: center; overflow-x: hidden; padding-bottom: 90px;
        }

        /* DEMENTIA MODE STYLE */
        body.dementia-mode {
            --bg-gradient: linear-gradient(135deg, #e0f7fa, #b2ebf2, #80deea);
            color: #111;
        }
        body.dementia-mode .header-container { background: #fff; border-bottom: 3px solid #00acc1; }
        body.dementia-mode .btn { background: #fff; color: #000; border: 2px solid #00acc1; }
        body.dementia-mode .user-name { color: #00838f; }

        /* OVERLAY FIX */
        #initOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 100000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Orbitron'; color: var(--neon-blue); cursor: pointer; backdrop-filter: blur(15px);
        }

        .header-container {
            padding: 40px 20px 30px;
            background: radial-gradient(circle at top, #1a237e, #000);
            border-bottom: 2px solid var(--neon-blue);
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        .shield-wrapper { position: relative; width: 130px; height: 150px; margin: 0 auto 15px; cursor: pointer; }
        .shield-outer { width: 100%; height: 100%; background: linear-gradient(180deg, #fff, #888, #333); clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%); display: flex; align-items: center; justify-content: center; }
        .shield-inner { width: 94%; height: 94%; background-color: #222; background-size: cover; background-position: center; clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%); }
        .user-name { font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--neon-blue); }

        .content-container { padding: 30px 20px; }
        .btn {
            width: 100%; border: none; border-radius: 16px; padding: 18px; margin-bottom: 15px;
            font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            color: white; background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn-sos { background: linear-gradient(135deg, #d50000, #990000); height: 100px; animation: pulse 2s infinite; font-size: 20px; }

        /* FLOATING MODE CIRCLE */
        .mode-fab {
            position: fixed; top: 20px; right: 20px; width: 45px; height: 45px;
            background: var(--neon-blue); color: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10001; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 15px var(--neon-blue);
        }

        #modeMenu {
            display: none; position: fixed; top: 75px; right: 20px;
            background: #111; border: 1px solid #444; border-radius: 12px;
            padding: 5px; z-index: 10001; width: 160px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .mode-opt { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; font-size: 13px; color: #fff; text-align: left; }
        .mode-opt:last-child { border-bottom: none; }

        /* SETTINGS PANEL */
        .id-box { background: #111; padding: 20px; border-radius: 15px; text-align: left; display: none; margin-top: 10px; border: 1px solid #333; }
        .id-input { width: 100%; padding: 12px; margin: 8px 0; background: #222; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }

        #stealthOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 99998; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>

<body>

    <div id="initOverlay" onclick="masterInit()">
        <i class="fas fa-shield-alt" style="font-size: 50px; margin-bottom: 20px;"></i>
        <h2 style="letter-spacing: 2px;">TAP TO ARM SYSTEM</h2>
        <p style="font-size: 12px; opacity: 0.7;">Click to Activate Security</p>
    </div>

    <div class="mode-fab" onclick="toggleModeMenu()"><i class="fas fa-sync-alt"></i></div>
    <div id="modeMenu">
        <div class="mode-opt" onclick="setAppMode('girls')"><i class="fas fa-venus"></i> Women Safety</div>
        <div class="mode-opt" onclick="setAppMode('dementia')"><i class="fas fa-brain"></i> Dementia Care</div>
    </div>

    <div class="header-container">
        <div class="shield-wrapper" onclick="triggerUpload()">
            <div class="shield-outer"><div class="shield-inner" id="displayProfilePic"></div></div>
        </div>
        <div class="user-name" id="displayHeaderName">Raksha User</div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)" style="display:none;">
    </div>

    <div class="content-container">
        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:15px; color:#aaa; font-family:'Orbitron';">
            <span>SYSTEM: <b id="systemStatus" style="color:#ff3333">OFFLINE</b></span>
            <span>BATTERY: <b id="batDisplay" style="color:var(--neon-blue)">--%</b></span>
        </div>

        <button class="btn btn-sos" id="mainSosBtn" onclick="startEmergency('Manual SOS')">
            <i class="fas fa-biohazard"></i> SOS EMERGENCY
        </button>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" onclick="manualLocation()"><i class="fas fa-location-arrow"></i> Share Loc</button>
            <button class="btn" onclick="makeCall()"><i class="fas fa-phone"></i> Call Emergency</button>
        </div>

        <button id="guardBtn" class="btn" onclick="toggleScreamGuard()" style="color: #ff9800; border-color: #ff9800;">
            <i class="fas fa-microphone-alt"></i> ACTIVATE GUARD (SCREAM)
        </button>

        <button class="btn" onclick="toggleSettings()"><i class="fas fa-cog"></i> Settings</button>

        <div class="id-box" id="settingsPanel">
            <h3 style="color:var(--neon-blue); margin-top:0;">Configuration</h3>
            <input type="text" id="userNameInput" class="id-input" placeholder="Your Name">
            <input type="number" id="userChatId" class="id-input" placeholder="Telegram Chat ID">
            <input type="tel" id="userPhone" class="id-input" placeholder="Guardian Phone">
            <button class="btn" style="background:var(--neon-blue); color:black; margin-top:10px;" onclick="saveSettings()">SAVE SETTINGS</button>
        </div>
    </div>

    <div id="stealthOverlay" onclick="handleStealthTap()"></div>

    <script>
        let isArmed = false, emergencyActive = false, tapCount = 0;
        let audioContext, analyser, microphone, javascriptNode;

        // TAP TO ARM FIX
        function masterInit() {
            document.getElementById('initOverlay').style.display = 'none';
            document.getElementById('systemStatus').innerText = 'ARMED';
            document.getElementById('systemStatus').style.color = '#00d2ff';
            isArmed = true;
            getBatteryLevel();
        }

        // SETTINGS PANEL FIX - (Removed the Alert that was blocking)
        function toggleSettings() {
            const p = document.getElementById("settingsPanel");
            p.style.display = (p.style.display === "block" ? "none" : "block");
        }

        function saveSettings() {
            localStorage.setItem("raksha_chat_id", document.getElementById("userChatId").value);
            localStorage.setItem("raksha_user_name", document.getElementById("userNameInput").value);
            localStorage.setItem("raksha_phone", document.getElementById("userPhone").value);
            alert("Settings Saved Successfully!");
            location.reload();
        }

        // SCREAM DETECTION
        async function initScreamDetection() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);
                analyser.fftSize = 1024;
                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    let array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) values += array[i];
                    let average = values / array.length;
                    if (average > 85 && !emergencyActive) startEmergency("SCREAM DETECTED");
                };
            } catch (e) { console.log("Mic Access Denied"); }
        }

        function toggleScreamGuard() {
            if(!isArmed) return alert("System Not Armed!");
            document.getElementById("stealthOverlay").style.display = "block";
            initScreamDetection();
            window.addEventListener('devicemotion', e => {
                let a = e.accelerationIncludingGravity;
                if(Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z) > 48 && !emergencyActive) startEmergency("SHAKE DETECTED");
            });
        }

        // MODE LOGIC
        function toggleModeMenu() {
            let m = document.getElementById("modeMenu");
            m.style.display = (m.style.display === "block" ? "none" : "block");
        }

        function setAppMode(mode) {
            localStorage.setItem("raksha_mode", mode);
            applyMode(mode);
            toggleModeMenu();
        }

        function applyMode(mode) {
            if(mode === 'dementia') {
                document.body.classList.add("dementia-mode");
                document.getElementById("mainSosBtn").innerHTML = '<i class="fas fa-medkit"></i> I NEED HELP';
            } else {
                document.body.classList.remove("dementia-mode");
                document.getElementById("mainSosBtn").innerHTML = '<i class="fas fa-biohazard"></i> SOS EMERGENCY';
            }
        }

        async function getBatteryLevel() {
            try {
                const b = await navigator.getBattery();
                document.getElementById('batDisplay').innerText = Math.round(b.level * 100) + "%";
            } catch(e) {}
        }

        async function startEmergency(type) {
            if(emergencyActive) return;
            emergencyActive = true;
            if(navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            const chatID = localStorage.getItem("raksha_chat_id");
            const botToken = "8378037937:AAGjuFdZWLnf0kFfTG_QIFCslgvrDMb-sC4";
            if(chatID) {
                const msg = `🚨 EMERGENCY TRIGGERED\nMode: ${type}\nUser: ${localStorage.getItem("raksha_user_name")}`;
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent(msg)}`);
            }
            alert("SOS ACTIVE: " + type);
        }

        function handleStealthTap() { tapCount++; if(tapCount>=6) location.reload(); }
        function triggerUpload() { document.getElementById('fileInput').click(); }
        function handleImageUpload(e) { 
            const reader = new FileReader(); 
            reader.onload = (ev) => { 
                localStorage.setItem("raksha_pic", ev.target.result); 
                document.getElementById("displayProfilePic").style.backgroundImage = `url(${ev.target.result})`; 
            }; 
            reader.readAsDataURL(e.target.files[0]); 
        }
        function makeCall() { window.location.href = "tel:" + (localStorage.getItem("raksha_phone") || "112"); }
        function manualLocation() { alert("Sending live location to guardian..."); }

        window.onload = () => {
            const pic = localStorage.getItem("raksha_pic"), name = localStorage.getItem("raksha_user_name");
            if(pic) document.getElementById("displayProfilePic").style.backgroundImage = `url(${pic})`;
            if(name) document.getElementById("displayHeaderName").innerText = name;
            document.getElementById("userChatId").value = localStorage.getItem("raksha_chat_id") || "";
            document.getElementById("userPhone").value = localStorage.getItem("raksha_phone") || "";
            document.getElementById("userNameInput").value = name || "";
            applyMode(localStorage.getItem("raksha_mode") || "girls");
        };
    </script>
</body>
</html>
