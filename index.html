<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raksha Elite - Hardcore Master</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00d2ff;
            --neon-pink: #ff0055;
            --alert-red: #ff3333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: #fff; margin: 0; padding: 0;
            min-height: 100vh; user-select: none;
            text-align: center; overflow-x: hidden; padding-bottom: 90px;
            transition: 0.5s;
        }

        /* DEMENTIA MODE STYLE */
        body.dementia-mode {
            --bg-gradient: linear-gradient(135deg, #e0f7fa, #b2ebf2, #80deea);
            color: #111;
        }
        body.dementia-mode .header-container { background: #fff; border-bottom: 3px solid #00acc1; }
        body.dementia-mode .btn { background: #fff; color: #000; border: 2px solid #00acc1; }
        body.dementia-mode .user-name { color: #00838f; }

        #initOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Orbitron'; color: var(--neon-blue); cursor: pointer; backdrop-filter: blur(10px);
        }

        .header-container {
            padding: 40px 20px 30px;
            background: radial-gradient(circle at top, #1a237e, #000);
            border-bottom: 2px solid var(--neon-blue);
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        .shield-wrapper { position: relative; width: 130px; height: 150px; margin: 0 auto 15px; cursor: pointer; filter: drop-shadow(0 0 15px var(--neon-blue)); }
        .shield-outer { width: 100%; height: 100%; background: linear-gradient(180deg, #fff, #888, #333); clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%); display: flex; align-items: center; justify-content: center; }
        .shield-inner { width: 94%; height: 94%; background-color: #222; background-size: cover; background-position: center; clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%); }
        .user-name { font-family: 'Orbitron', sans-serif; font-size: 24px; color: var(--neon-blue); }

        .content-container { padding: 30px 20px; }
        .btn {
            width: 100%; border: none; border-radius: 16px; padding: 18px; margin-bottom: 15px;
            font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            color: white; background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn-sos { background: linear-gradient(135deg, #d50000, #990000); height: 110px; animation: pulse 2s infinite; flex-direction: column; font-size: 20px; }

        /* FLOATING MODE SWITCHER */
        .mode-fab {
            position: fixed; top: 20px; right: 20px; width: 50px; height: 50px;
            background: var(--neon-blue); color: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--neon-blue); z-index: 10001; cursor: pointer;
            border: 2px solid #fff;
        }

        #modeMenu {
            display: none; position: fixed; top: 80px; right: 20px;
            background: #222; border: 1px solid #444; border-radius: 12px;
            padding: 10px; z-index: 10001;
        }
        .mode-opt { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; font-size: 13px; }

        #stealthOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 99998; }
        #angelAlertBox { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, #8b0000, #000); border-top: 3px solid red; padding: 35px 20px; z-index: 99999; text-align: center; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>

<body onclick="masterInit()" ontouchstart="masterInit()">

    <div id="initOverlay">
        <i class="fas fa-shield-alt" style="font-size: 50px; margin-bottom: 20px;"></i>
        <h2>TAP TO ARM SYSTEM</h2>
    </div>

    <div class="mode-fab" onclick="toggleModeMenu()"><i class="fas fa-sync-alt"></i></div>
    <div id="modeMenu">
        <div class="mode-opt" onclick="setAppMode('girls')">👩 Women Safety</div>
        <div class="mode-opt" onclick="setAppMode('dementia')">🧠 Dementia Care</div>
    </div>

    <div class="header-container">
        <div class="shield-wrapper" onclick="triggerUpload()">
            <div class="shield-outer"><div class="shield-inner" id="displayProfilePic"></div></div>
        </div>
        <div class="user-name" id="displayHeaderName">Raksha User</div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)" style="display:none;">
    </div>

    <div class="content-container">
        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:15px; color:#aaa; font-family:'Orbitron';">
            <span>SYSTEM: <b id="systemStatus" style="color:#666">OFFLINE</b></span>
            <span id="angelStatusDisplay">ANGEL: OFF</span>
            <span>BATTERY: <b id="batDisplay" style="color:var(--neon-blue)">--%</b></span>
        </div>

        <button class="btn btn-sos" id="mainSosBtn" onclick="startEmergency('Manual SOS')">
            <i class="fas fa-biohazard"></i> SOS EMERGENCY
        </button>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" onclick="manualLocation()"><i class="fas fa-location-arrow"></i> Share Loc</button>
            <button class="btn" onclick="makeCall()"><i class="fas fa-phone"></i> Call Guardian</button>
        </div>

        <button id="guardBtn" class="btn" onclick="toggleScreamGuard()" style="color: #ff9800; border-color: #ff9800;">
            <i class="fas fa-microphone-alt"></i> ACTIVATE GUARD (SCREAM)
        </button>

        <button class="btn" id="fakeCallBtn" onclick="triggerFakeCall()" style="color: #e1bee7; border-color: #ab47bc;">
            <i class="fas fa-user-secret"></i> Fake Ghost Call
        </button>

        <button class="btn" onclick="toggleSettings()"><i class="fas fa-cog"></i> Settings</button>
    </div>

    <div id="stealthOverlay" onclick="handleStealthTap()"></div>
    <video id="hiddenVideo" autoplay playsinline muted style="display:none;"></video>

    <script>
        let isArmed = false, emergencyActive = false, tapCount = 0;
        let audioContext, analyser, microphone, javascriptNode;
        const BOT_TOKEN = "8378037937:AAGjuFdZWLnf0kFfTG_QIFCslgvrDMb-sC4";
        
        // --- SCREAM DETECTION LOGIC ---
        async function initScreamDetection() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                javascriptNode.onaudioprocess = function() {
                    let array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) values += array[i];
                    let average = values / array.length;

                    if (average > 75) { // Threshold for a loud scream
                        if (!emergencyActive && isArmed) startEmergency("SCREAM DETECTED");
                    }
                };
            } catch (e) { console.log("Scream Guard Error: ", e); }
        }

        function toggleScreamGuard() {
            document.getElementById("stealthOverlay").style.display = "block";
            initScreamDetection(); // Starts listening
            window.addEventListener('devicemotion', e => {
                let a = e.accelerationIncludingGravity;
                if(Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z) > 45 && !emergencyActive) startEmergency("SHAKE DETECTED");
            });
        }

        // --- MODE SWITCHER LOGIC ---
        function toggleModeMenu() {
            let m = document.getElementById("modeMenu");
            m.style.display = (m.style.display === "block" ? "none" : "block");
        }

        function setAppMode(mode) {
            localStorage.setItem("raksha_mode", mode);
            applyMode(mode);
            toggleModeMenu();
        }

        function applyMode(mode) {
            const body = document.body;
            const sosBtn = document.getElementById("mainSosBtn");
            if(mode === 'dementia') {
                body.classList.add("dementia-mode");
                sosBtn.innerHTML = '<i class="fas fa-medkit"></i> I NEED HELP';
            } else {
                body.classList.remove("dementia-mode");
                sosBtn.innerHTML = '<i class="fas fa-biohazard"></i> SOS EMERGENCY';
            }
        }

        async function masterInit() {
            if (isArmed) return;
            document.getElementById('initOverlay').style.display = 'none';
            document.getElementById('systemStatus').innerText = 'ARMED';
            document.getElementById('systemStatus').style.color = '#00d2ff';
            isArmed = true;
            applyMode(localStorage.getItem("raksha_mode") || "girls");
        }

        // SOS and other existing logic remains identical to keep it functional
        async function startEmergency(triggerType = "Manual") {
            if(emergencyActive) return;
            emergencyActive = true;
            const chatID = localStorage.getItem("raksha_chat_id") || "8508792403";
            const user = localStorage.getItem("raksha_user_name") || "Victim";
            document.getElementById("stealthOverlay").style.display = "block";
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent("🚨 " + triggerType + " from " + user)}`);
        }

        function handleStealthTap() { tapCount++; if(tapCount>=6) location.reload(); }
        function triggerUpload() { document.getElementById('fileInput').click(); }
        function toggleSettings() { alert("Settings Panel logic here (as per your original code)"); }
        function triggerFakeCall() { alert("Fake call triggered..."); }

        window.onload = () => {
            applyMode(localStorage.getItem("raksha_mode") || "girls");
        };
    </script>
</body>
</html>
